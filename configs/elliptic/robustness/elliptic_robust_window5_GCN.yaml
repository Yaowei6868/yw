name: elliptic_robust_window5_GCN

dataset:
  features_path: "data/elliptic/elliptic_txs_features.csv"
  edges_path: "data/elliptic/elliptic_txs_edgelist.csv"
  classes: "data/elliptic/elliptic_txs_classes.csv"

model:
  input_dim: ???
  hidden_dim: 128
  output_dim: 1
  dropout: 0.5

train:
  dataset: elliptic
  model: gcn
  device: cuda
  lr: 0.001
  weight_decay: 1e-5
  print_freq: 10
  save_dir: weights/robustness/elliptic_robust_window5_GCN

  num_epochs_per_task: 100
  task_schedule:
    - [1, 10]
    - [11, 20]
    - [21, 30]
    - [31, 40]
    - [41, 49]
  ewc_lambda: 0.0
  lwf_alpha: 0.0
  lwf_temperature: 1.0
  buffer_size_per_class: 0
  threshold: 0.5
