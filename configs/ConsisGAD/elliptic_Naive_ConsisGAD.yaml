name: elliptic_Naive_ConsisGAD
dataset:
  features_path: "data/elliptic/elliptic_txs_features.csv"
  edges_path: "data/elliptic/elliptic_txs_edgelist.csv"
  classes: "data/elliptic/elliptic_txs_classes.csv"

model:
  # ConsisGAD 参数
  input_dim: ???      # 自动推断 (166)
  hidden_dim: 64      # 建议设为 64，因为 LGA 生成器需要额外的显存，设太大会 OOM
  output_dim: 1
  dropout: 0.5
  
  # GNN Backbone 配置 (ConsisGAD 通常使用 GCN 或 GAT 作为骨干)
  # 这里我们使用简单的 GCN 结构以保持轻量化
  num_layers: 2

train:
  dataset: elliptic
  model: consisgad    # <--- 对应 models_map 中的 key，触发 Trainer 中的 LGA 预训练逻辑
  device: cuda
  lr: 0.001           # 主分类器的学习率 (LGA 模块在 Trainer 中硬编码为 0.01)
  weight_decay: 1e-5
  print_freq: 10
  save_dir: weights/consisgad/
  
  # Naive 实验设置 (无增量学习策略，仅测试模型本身在流式数据上的能力)
  num_epochs_per_task: 100
  task_schedule: 
    - [1, 5]
    - [6, 10]
    - [11, 15]
    - [16, 20]
    - [21, 25]
    - [26, 30]
    - [31, 35]
    - [36, 40]
    - [41, 45]
    - [46, 49]
    
  ewc_lambda: 0.0
  lwf_alpha: 0.0
  lwf_temperature: 1.0
  buffer_size_per_class: 0 