name: elliptic_Replaystagnn

dataset:
  features_path: "data/elliptic/elliptic_txs_features.csv"
  edges_path: "data/elliptic/elliptic_txs_edgelist.csv"
  classes: "data/elliptic/elliptic_txs_classes.csv"

model:
  # [关键] STAGNN 基于 GAT，必须指定注意力头数
  num_heads: 4
  # input_dim 通常会被代码中的 self.dataset.num_node_features 覆盖 (Elliptic为166)
  input_dim: 166
  hidden_dim: 128
  output_dim: 1
  dropout: 0.5

train:
  dataset: elliptic
  # [关键] 指定使用 STAGNN 模型 (需在 trainer.py 的 models_map 中注册)
  model: stagnn
  device: cuda
  # GAT 类模型通常需要稍大的 LR (如 0.001 或 0.005) 来加速收敛
  lr: 0.001
  weight_decay: 1e-5
  print_freq: 10
  save_dir: weights/stagnn_replay/
  
  # 持续学习任务调度 (按时间步切分)
  num_epochs_per_task: 50
  task_schedule: 
    - [1, 5]
    - [6, 10]
    - [11, 15]
    - [16, 20]
    - [21, 25]
    - [26, 30]
    - [31, 35]
    - [36, 40]
    - [41, 45]
    - [46, 49]
    
  # --- CL 策略配置 ---
  
  # 1. Replay (启用)
  buffer_size_per_class: 100    # 经验回放：每类保留100个样本
  
  # 2. EWC (关闭)
  ewc_lambda: 0.0
  
  # 3. LwF (关闭)
  lwf_alpha: 0.0
  lwf_temperature: 1.0